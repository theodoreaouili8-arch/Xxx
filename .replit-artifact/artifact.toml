kind = "web"
previewPath = "/"
title = "VideoHub"
version = "1.0.0"
id = "artifacts/video-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21445

[services.development]
run = "pnpm --filter @workspace/video-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/video-hub", "run", "build" ]
publicDir = "artifacts/video-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21445"
BASE_PATH = "/"
